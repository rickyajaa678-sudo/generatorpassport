<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Nama Acak</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; margin: 10px; transition: background 0.2s; font-weight: bold;}
        button:hover { background-color: #0056b3; }
        .copy-btn { background-color: #28a745; }
        .copy-btn:hover { background-color: #218838; }
        #nameDisplay { font-size: 24px; font-weight: bold; margin: 20px 0; min-height: 35px; color: #333; padding: 10px; background: #f8f9fa; border-radius: 6px; border: 1px dashed #ccc; }
        #alert { color: #28a745; font-size: 14px; height: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Generator Nama Acak</h2>
        <div id="nameDisplay">Klik tombol di bawah</div>
        <button onclick="generateName()">Acak Nama</button>
        <button class="copy-btn" onclick="copyName()">Salin Nama</button>
        <div id="alert"></div>
    </div>

    <script>
        const names = [
            "Budi Santoso", "Siti Aminah", "Ahmad Hidayat", "Dewi Lestari", 
            "Rian Wijaya", "Putri Utami", "Eko Prasetyo", "Mega Tiara", 
            "Fajar Nugroho", "Anisa Rahma", "Kevin Sanjaya", "Jessica Mila"
        ];

        function generateName() {
            const randomIndex = Math.floor(Math.random() * names.length);
            document.getElementById("nameDisplay").innerText = names[randomIndex];
            document.getElementById("alert").innerText = "";
        }

        function copyName() {
            const nameText = document.getElementById("nameDisplay").innerText;
            if (nameText === 'Klik tombol di bawah') return;
            
            navigator.clipboard.writeText(nameText).then(() => {
                const alertDiv = document.getElementById("alert");
                alertDiv.innerText = "✓ Nama berhasil disalin!";
                setTimeout(() => { alertDiv.innerText = ""; }, 2000);
            }).catch(err => {
                alert("Gagal menyalin teks");
            });
        }
    </script>
</body>
</html>
