<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Nama Buat 8 Digit</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; margin: 10px; transition: background 0.2s; font-weight: bold;}
        button:hover { background-color: #0056b3; }
        .copy-btn { background-color: #28a745; }
        .copy-btn:hover { background-color: #218838; }
        #nameDisplay { font-size: 24px; font-weight: bold; margin: 20px 0; min-height: 35px; color: #333; padding: 10px; background: #f8f9fa; border-radius: 6px; border: 1px dashed #ccc; text-transform: uppercase; letter-spacing: 1px; }
        #alert { color: #28a745; font-size: 14px; height: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Generator Nama Buah</h2>
        <!-- Tempat kode muncul -->
        <div id="nameDisplay">Klik tombol di bawah</div>
        
        <!-- Tombol Aksi -->
        <button onclick="generateFruitCode()">Acak Nama</button>
        <button class="copy-btn" onclick="copyCode()">Salin Nama</button>
        
        <!-- Notifikasi Salin -->
        <div id="alert"></div>
    </div>

    <script>
        // Daftar nama kombinasi buah berdurasi pendek/panjang
        const fruits = [
            "Semangka", "Alpukatx", "Belimbing", "Strawberry", 
            "Durianxx", "Manggisx", "Rambutan", "Cempedak", 
            "Kelengkeng", "Sirsakxx", "Markisah", "Srikayaa"
        ];

        // Fungsi mengacak nama buah dan memastikan tepat 8 digit tanpa spasi
        function generateFruitCode() {
            const randomIndex = Math.floor(Math.random() * fruits.length);
            let fruitName = fruits[randomIndex].replace(/\s+/g, ''); // Hapus spasi jika ada
            
            // Jika nama buah kurang dari 8 karakter, ditambah huruf acak di ujungnya
            while (fruitName.length < 8) {
                fruitName += "X"; 
            }
            
            // Potong teks agar tepat menjadi 8 karakter saja
            const finalResult = fruitName.substring(0, 8);
            
            document.getElementById("nameDisplay").innerText = finalResult;
            document.getElementById("alert").innerText = ""; 
        }

        // Fungsi menyalin teks
        function copyCode() {
            const codeText = document.getElementById("nameDisplay").innerText;
            if (codeText === 'Klik tombol di bawah') return;
            
            navigator.clipboard.writeText(codeText).then(() => {
                const alertDiv = document.getElementById("alert");
                alertDiv.innerText = "✓ Nama berhasil disalin!";
                setTimeout(() => { alertDiv.innerText = ""; }, 2000);
            }).catch(err => {
                alert("Gagal menyalin teks");
            });
        }
    </script>
</body>
</html>
