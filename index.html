<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Straw Hat Code</title>
    <style>
        /* Animasi bergerak untuk latar belakang gradasi */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            /* Latar belakang gradasi bergerak bertema petualangan laut */
            background: linear-gradient(-45deg, #e67e22, #f1c40f, #3498db, #2980b9);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
        }

        .card { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.15); 
            text-align: center; 
            max-width: 400px; 
            width: 100%; 
        }

        /* Tombol dengan efek animasi membal (scale) saat diklik */
        button { 
            background-color: #e67e22; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            font-size: 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            margin: 10px; 
            transition: all 0.2s ease; 
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover { 
            background-color: #d35400; 
            transform: translateY(-2px); /* Tombol sedikit naik saat disentuh */
        }
        button:active {
            transform: scale(0.95); /* Efek membal mendelep saat diklik */
        }

        .copy-btn { background-color: #27ae60; }
        .copy-btn:hover { background-color: #219a52; }

        /* Animasi fade-in halus untuk teks kode saat berganti */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        #nameDisplay { 
            font-size: 24px; 
            font-weight: bold; 
            margin: 20px 0; 
            min-height: 35px; 
            color: #2c3e50; 
            padding: 12px; 
            background: #f8f9fa; 
            border-radius: 8px; 
            border: 2px dashed #e67e22; 
            letter-spacing: 2px; 
        }
        .animate-text {
            animation: fadeIn 0.3s ease forwards;
        }

        #alert { color: #27ae60; font-size: 14px; height: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color: #2c3e50; margin-top: 0;">Straw Hat Generator</h2>
        <!-- Tempat teks muncul -->
        <div id="nameDisplay">klik tombol di bawah</div>
        
        <!-- Tombol Aksi -->
        <button onclick="generateOnePieceCode()">Acak Kode</button>
        <button class="copy-btn" onclick="copyCode()">Salin Kode</button>
        
        <!-- Notifikasi Salin -->
        <div id="alert"></div>
    </div>

    <script>
        // Daftar nama bertema Sunny Go dan Kru Topi Jerami (huruf kecil semua)
        const strawHats = [
            "luffy", "zoro", "nami", "usopp", "sanji", "chopper", 
            "robin", "franky", "brook", "jinbe", "sunnygo"
        ];

        function generateOnePieceCode() {
            // 1. Pilih nama secara acak
            const randomIndex = Math.floor(Math.random() * strawHats.length);
            let result = strawHats[randomIndex];
            
            // 2. Jika nama kepanjangan (lebih dari 6 karakter), potong sedikit agar muat angka
            if (result.length > 6) {
                result = result.substring(0, 5);
            }
            
            // 3. Tambahkan angka acak di belakangnya hingga total panjang tepat 8 karakter
            while (result.length < 8) {
                const randomDigit = Math.floor(Math.random() * 10);
                result += randomDigit;
            }
            
            // Tampilkan hasil dengan tambahan animasi teks memudar masuk
            const display = document.getElementById("nameDisplay");
            display.innerText = result;
            display.classList.remove("animate-text");
            void display.offsetWidth; // Memicu ulang jalannya animasi
            display.classList.add("animate-text");
            
            document.getElementById("alert").innerText = ""; 
        }

        // Fungsi menyalin teks
        function copyCode() {
            const codeText = document.getElementById("nameDisplay").innerText;
            if (codeText === 'klik tombol di bawah') return;
            
            navigator.clipboard.writeText(codeText).then(() => {
                const alertDiv = document.getElementById("alert");
                alertDiv.innerText = "✓ Kode berhasil disalin!";
                setTimeout(() => { alertDiv.innerText = ""; }, 2000);
            }).catch(err => {
                alert("Gagal menyalin teks");
            });
        }
    </script>
</body>
</html>
