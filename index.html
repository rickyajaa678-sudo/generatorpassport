<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Kode Buah - Edisi Kru Topi Jerami</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            /* Menggunakan pola gambar jangkar & roda kemudi kapal laut yang ditanam langsung di dalam kode */
            background-color: #1c2e4a;
            background-image: url("data:image/svg+xml,%3Csvg xmlns='http://w3.org' width='60' height='60' viewBox='0 0 60 60'%3E%3Cpath d='M30 5c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 8c-3.9 0-7 3.1-7 7v10h2v-10c0-2.8 2.2-5 5-5s5 2.2 5 5v10h2v-10c0-3.9-3.1-7-7-7zm-11 17h-4v2h4v-2zm26 0h-4v2h4v-2zm-15 4c-2.2 0-4 1.8-4 4s1.8 4 4 4 4-1.8 4-4-1.8-4-4-4zm0 18c-7.7 0-14-6.3-14-14h-2c0 8.8 7.2 16 16 16s16-7.2 16-16h-2c0 7.7-6.3 14-14 14z' fill='%232c4466' fill-opacity='0.4'/%3E%3C/svg%3E");
        }

        /* Kartu utama dengan efek buram transparan tipis agar menyatu dengan laut */
        .card { 
            background: rgba(255, 255, 255, 0.94); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.5); 
            text-align: center; 
            max-width: 400px; 
            width: 90%; 
            border: 4px solid #e67e22; /* Warna khas Thousand Sunny */
        }

        h2 {
            color: #2c3e50; 
            margin-top: 0;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        button { 
            background-color: #e74c3c; /* Merah baju luffy */
            color: white; 
            border: none; 
            padding: 14px 28px; 
            font-size: 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            margin: 10px; 
            transition: all 0.2s ease; 
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        button:hover { 
            background-color: #c0392b; 
            transform: translateY(-2px); 
        }
        button:active {
            transform: scale(0.95); 
        }

        .copy-btn { background-color: #27ae60; }
        .copy-btn:hover { background-color: #219a52; }

        #nameDisplay { 
            font-size: 26px; 
            font-weight: bold; 
            margin: 20px 0; 
            min-height: 38px; 
            color: #d35400; 
            padding: 12px; 
            background: #fdf6e2; 
            border-radius: 8px; 
            border: 2px dashed #e67e22; 
            letter-spacing: 2px; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-text {
            animation: fadeIn 0.2s ease forwards;
        }

        #alert { color: #27ae60; font-size: 14px; height: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🏴‍☠️ Straw Hat Fruit Generator 🍊</h2>
        <div id="nameDisplay">klik tombol di bawah</div>
        
        <button onclick="generateFruitNumberCode()">Acak Kode</button>
        <button class="copy-btn" onclick="copyCode()">Salin Kode</button>
        
        <div id="alert"></div>
    </div>

    <script>
        const fruits = [
            "apel", "jeruk", "mangga", "pisang", "melon", "durian", 
            "jambu", "nanas", "anggur", "pepaya", "salak", "manggis"
        ];

        function generateFruitNumberCode() {
            const randomIndex = Math.floor(Math.random() * fruits.length);
            let result = fruits[randomIndex];
            
            if (result.length > 6) {
                result = result.substring(0, 5);
            }
            
            while (result.length < 8) {
                const randomDigit = Math.floor(Math.random() * 10);
                result += randomDigit;
            }
            
            const display = document.getElementById("nameDisplay");
            display.innerText = result;
            display.classList.remove("animate-text");
            void display.offsetWidth; 
            display.classList.add("animate-text");
            
            document.getElementById("alert").innerText = ""; 
        }

        function copyCode() {
            const codeText = document.getElementById("nameDisplay").innerText;
            if (codeText === 'klik tombol di bawah') return;
            
            navigator.clipboard.writeText(codeText).then(() => {
                const alertDiv = document.getElementById("alert");
                alertDiv.innerText = "✓ Kode berhasil disalin!";
                setTimeout(() => { alertDiv.innerText = ""; }, 2000);
            }).catch(err => {
                alert("Gagal menyalin teks");
            });
        }
    </script>
</body>
</html>
