        // --- 1. LOGIKA EFEK SUARA PREMIUM (AUDIO SYNTHESIZER BROWSER) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Efek Suara Petir Elektrik (Tombol Acak)
        function playLightningSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        // Efek Suara Dentingan Lonceng Sukses (Tombol Salin)
        function playChimeSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }


        // --- 2. LOGIKA UTAMA EFEK LIVE SALJU BERGUGURAN ---
        const container = document.getElementById('snowflake-container');
        const maxSnowflakes = 40;

        function createSnowflake() {
            if (container.children.length >= maxSnowflakes) return;

            const snowflake = document.createElement('div');
            snowflake.classList.add('snowflake');

            const size = Math.random() * 4 + 2;
            snowflake.style.width = `${size}px`;
            snowflake.style.height = `${size}px`;
            snowflake.style.left = `${Math.random() * 100}%`;
            snowflake.style.top = `-10px`;

            container.appendChild(snowflake);

            let topPos = -10;
            let leftPos = parseFloat(snowflake.style.left);
            const drift = Math.random() * 0.4 - 0.2;

            const fallInterval = setInterval(() => {
                topPos += Math.random() * 1 + 0.5;
                leftPos += drift;

                snowflake.style.top = `${topPos}px`;
                snowflake.style.left = `${leftPos}%`;

                if (topPos > window.innerHeight) {
                    clearInterval(fallInterval);
                    snowflake.remove();
                }
            }, 20);
        }

        setInterval(createSnowflake, 300);

            } else {
                themeBtn.innerText = "🌙";
            }
        }
