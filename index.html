<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Kode Buah - Edisi Spesial</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background: url('thumb-1920-1409704.jpg') no-repeat center center fixed;
            background-size: cover;
            background-color: #1c2e4a; 
            transition: background 0.3s ease;
        }

        /* Tampilan Default: Mode Terang (Putih Transparan) */
        .card { 
            background: rgba(255, 255, 255, 0.88); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            text-align: center; 
            max-width: 400px; 
            width: 90%; 
            border: 4px solid #e67e22; 
            position: relative;
            transition: all 0.3s ease;
        }

        /* Style Tambahan untuk MODE GELAP (Hitam Transparan) */
        .dark-mode .card {
            background: rgba(20, 24, 33, 0.9); 
            border-color: #f1c40f; /* Ganti bingkai jadi kuning emas bajak laut */
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
        }

        .dark-mode h2 {
            color: #f1c40f !important;
        }

        .dark-mode #nameDisplay {
            background: #2c3e50;
            color: #f1c40f;
            border-color: #f1c40f;
        }

        h2 {
            color: #2c3e50; 
            margin-top: 10px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        /* Tombol Utama */
        button { 
            background-color: #e74c3c; 
            color: white; 
            border: none; 
            padding: 14px 28px; 
            font-size: 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            margin: 10px; 
            transition: all 0.2s ease; 
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        button:hover { 
            background-color: #c0392b; 
            transform: translateY(-2px); 
        }
        button:active {
            transform: scale(0.95); 
        }

        .copy-btn { background-color: #27ae60; }
        .copy-btn:hover { background-color: #219a52; }

        /* Tombol Switch Dark/Light Mode di Pojok Atas Kartu */
        .theme-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            margin: 0;
            box-shadow: none;
            transition: transform 0.2s ease;
        }
        .theme-toggle:hover {
            transform: scale(1.2);
            background: none;
        }

        #nameDisplay { 
            font-size: 26px; 
            font-weight: bold; 
            margin: 20px 0; 
            min-height: 38px; 
            color: #d35400; 
            padding: 12px; 
            background: #fdf6e2; 
            border-radius: 8px; 
            border: 2px dashed #e67e22; 
            letter-spacing: 2px; 
            transition: all 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-text {
            animation: fadeIn 0.2s ease forwards;
        }

        #alert { color: #27ae60; font-size: 14px; height: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <!-- Tombol Ikon Bulan / Matahari -->
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

        <h2>🏴‍☠️ Straw Hat Fruit Generator 🍊</h2>
        <div id="nameDisplay">klik tombol di bawah</div>
        
        <button onclick="generateFruitNumberCode()">Acak Kode</button>
        <button class="copy-btn" onclick="copyCode()">Salin Kode</button>
        
        <div id="alert"></div>
    </div>

    <script>
        // Fungsi Mengubah Mode Gelap / Terang
        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById("themeBtn");
            
            body.classList.toggle("dark-mode");
            
            if (body.classList.contains("dark-mode")) {
                themeBtn.innerText = "☀️"; // Berubah jadi matahari jika mode gelap aktif
            } else {
                themeBtn.innerText = "🌙"; // Berubah jadi bulan jika mode terang aktif
            }
        }

        // Logika Generator Buah
        const fruits = [
            "apel", "jeruk", "mangga", "pisang", "melon", "durian", 
            "jambu", "nanas", "anggur", "pepaya", "salak", "manggis"
        ];

        function generateFruitNumberCode() {
            const randomIndex = Math.floor(Math.random() * fruits.length);
            let result = fruits[randomIndex];
            
            if (result.length > 6) {
                result = result.substring(0, 5);
            }
            
            while (result.length < 8) {
                const randomDigit = Math.floor(Math.random() * 10);
                result += randomDigit;
            }
            
            const display = document.getElementById("nameDisplay");
            display.innerText = result;
            display.classList.remove("animate-text");
            void display.offsetWidth; 
            display.classList.add("animate-text");
            
            document.getElementById("alert").innerText = ""; 
        }

        function copyCode() {
            const codeText = document.getElementById("nameDisplay").innerText;
            if (codeText === 'klik tombol di bawah') return;
            
            navigator.clipboard.writeText(codeText).then(() => {
                const alertDiv = document.getElementById("alert");
                alertDiv.innerText = "✓ Kode berhasil disalin!";
                setTimeout(() => { alertDiv.innerText = ""; }, 2000);
            }).catch(err => {
                alert("Gagal menyalin teks");
            });
        }
    </script>
</body>
</html>
