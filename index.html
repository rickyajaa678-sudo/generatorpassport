<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Buah dan Angka</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; margin: 10px; transition: background 0.2s; font-weight: bold;}
        button:hover { background-color: #0056b3; }
        .copy-btn { background-color: #28a745; }
        .copy-btn:hover { background-color: #218838; }
        #nameDisplay { font-size: 24px; font-weight: bold; margin: 20px 0; min-height: 35px; color: #333; padding: 10px; background: #f8f9fa; border-radius: 6px; border: 1px dashed #ccc; letter-spacing: 1px; }
        #alert { color: #28a745; font-size: 14px; height: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Generator Kode Buah</h2>
        <!-- Tempat teks muncul -->
        <div id="nameDisplay">klik tombol di bawah</div>
        
        <!-- Tombol Aksi -->
        <button onclick="generateFruitNumberCode()">Acak Kode</button>
        <button class="copy-btn" onclick="copyCode()">Salin Kode</button>
        
        <!-- Notifikasi Salin -->
        <div id="alert"></div>
    </div>

    <script>
        // Daftar nama buah dalam huruf kecil
        const fruits = [
            "apel", "jeruk", "mangga", "pisang", "melon", "durian", 
            "jambu", "nanas", "anggur", "pepaya", "salak", "manggis"
        ];

        function generateFruitNumberCode() {
            // 1. Pilih nama buah secara acak
            const randomIndex = Math.floor(Math.random() * fruits.length);
            let result = fruits[randomIndex];
            
            // 2. Jika nama buah kepanjangan (lebih dari 6 karakter agar tersisa ruang untuk angka), potong sedikit
            if (result.length > 6) {
                result = result.substring(0, 5);
            }
            
            // 3. Tambahkan angka acak di belakangnya sampai total panjangnya tepat 8 karakter
            while (result.length < 8) {
                const randomDigit = Math.floor(Math.random() * 10); // Angka 0-9
                result += randomDigit;
            }
            
            document.getElementById("nameDisplay").innerText = result;
            document.getElementById("alert").innerText = ""; 
        }

        // Fungsi menyalin teks
        function copyCode() {
            const codeText = document.getElementById("nameDisplay").innerText;
            if (codeText === 'klik tombol di bawah') return;
            
            navigator.clipboard.writeText(codeText).then(() => {
                const alertDiv = document.getElementById("alert");
                alertDiv.innerText = "✓ Kode berhasil disalin!";
                setTimeout(() => { alertDiv.innerText = ""; }, 2000);
            }).catch(err => {
                alert("Gagal menyalin teks");
            });
        }
    </script>
</body>
</html>
