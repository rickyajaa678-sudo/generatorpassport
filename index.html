<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Kode Acak 8 Digit</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; margin: 10px; transition: background 0.2s; font-weight: bold;}
        button:hover { background-color: #0056b3; }
        .copy-btn { background-color: #28a745; }
        .copy-btn:hover { background-color: #218838; }
        #nameDisplay { font-size: 24px; font-weight: bold; margin: 20px 0; min-height: 35px; color: #333; padding: 10px; background: #f8f9fa; border-radius: 6px; border: 1px dashed #ccc; letter-spacing: 2px; }
        #alert { color: #28a745; font-size: 14px; height: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Generator Kode Acak</h2>
        <!-- Tempat kode muncul -->
        <div id="nameDisplay">Klik tombol di bawah</div>
        
        <!-- Tombol Aksi -->
        <button onclick="generateCode()">Acak Kode</button>
        <button class="copy-btn" onclick="copyCode()">Salin Kode</button>
        
        <!-- Notifikasi Salin -->
        <div id="alert"></div>
    </div>

    <script>
        // Fungsi untuk membuat kombinasi huruf besar, huruf kecil, dan angka sepanjang 8 karakter
        function generateCode() {
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            const length = 8; // Mengunci panjang karakter hanya 8 digit
            
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * characters.length);
                result += characters.charAt(randomIndex);
            }
            
            document.getElementById("nameDisplay").innerText = result;
            document.getElementById("alert").innerText = ""; // Reset notifikasi
        }

        // Fungsi untuk menyalin kode ke clipboard
        function copyCode() {
            const codeText = document.getElementById("nameDisplay").innerText;
            if (codeText === 'Klik tombol di bawah') return;
            
            navigator.clipboard.writeText(codeText).then(() => {
                const alertDiv = document.getElementById("alert");
                alertDiv.innerText = "✓ Kode berhasil disalin!";
                setTimeout(() => { alertDiv.innerText = ""; }, 2000);
            }).catch(err => {
                alert("Gagal menyalin teks");
            });
        }
    </script>
</body>
</html>
