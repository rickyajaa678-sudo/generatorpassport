<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Kode Buah - Edisi Final Saul & Robin</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background: url('thumb-1920-1409704.jpg') no-repeat center center fixed;
            background-size: cover;
            background-color: #1c2e4a; 
            transition: background 0.3s ease;
            overflow: hidden;
            position: relative;
        }

        /* Animasi Salju CSS Murni */
        body::before, body::after {
            content: "";
            position: fixed;
            top: -100px;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 2;
            background-image: 
                radial-gradient(circle, #fff 10%, transparent 11%),
                radial-gradient(circle, #fff 8%, transparent 9%),
                radial-gradient(circle, #fff 6%, transparent 7%);
            background-size: 400px 400px;
            background-position: 0 0, 150px 200px, 250px 100px;
            animation: snowFall 12s linear infinite;
            opacity: 0.8;
        }

        body::after {
            background-size: 300px 300px;
            background-position: 50px 150px, 200px 50px, 100px 250px;
            animation-duration: 8s;
            opacity: 0.5;
        }

        @keyframes snowFall {
            0% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(50vh) translateX(20px); }
            100% { transform: translateY(100vh) translateX(0); }
        }

        .card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            text-align: center; 
            max-width: 400px; 
            width: 90%; 
            border: 4px solid #e67e22; 
            position: relative;
            z-index: 10; 
            transition: all 0.3s ease;
        }

        .dark-mode .card {
            background: rgba(20, 24, 33, 0.9); 
            border-color: #f1c40f; 
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
        }

        .dark-mode h2 { color: #f1c40f !important; }
        .dark-mode #nameDisplay { background: #2c3e50; color: #f1c40f; border-color: #f1c40f; }
        .dark-mode .quote-container { background: rgba(255, 255, 255, 0.05); border-left: 4px solid #f1c40f; color: #ddd; }
        .dark-mode .quote-author { color: #f1c40f; }

        h2 {
            color: #2c3e50; 
            margin-top: 10px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        button { 
            background-color: #e74c3c; 
            color: white; 
            border: none; 
            padding: 14px 28px; 
            font-size: 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            margin: 10px; 
            transition: all 0.2s ease; 
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        button:hover { background-color: #c0392b; transform: translateY(-2px); }
        button:active { transform: scale(0.95); }

        .copy-btn { background-color: #27ae60; }
        .copy-btn:hover { background-color: #219a52; }

        .theme-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            margin: 0;
            box-shadow: none;
            transition: transform 0.2s ease;
        }
        .theme-toggle:hover { transform: scale(1.2); background: none; }

        #nameDisplay { 
            font-size: 26px; 
            font-weight: bold; 
            margin: 20px 0; 
            min-height: 38px; 
            color: #d35400; 
            padding: 12px; 
            background: #fdf6e2; 
            border-radius: 8px; 
            border: 2px dashed #e67e22; 
            letter-spacing: 2px; 
            transition: all 0.3s ease;
        }

        .quote-container {
            margin-top: 25px;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.03);
            border-left: 4px solid #e67e22;
            border-radius: 4px;
            text-align: left;
            transition: all 0.3s ease;
        }
        .quote-text { font-style: italic; font-size: 14.5px; line-height: 1.5; color: #555; margin: 0 0 6px 0; }
        .quote-author { font-size: 12px; font-weight: bold; color: #e67e22; text-align: right; margin: 0; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-text { animation: fadeIn 0.2s ease forwards; }
        #alert { color: #27ae60; font-size: 14px; height: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

        <h2>🏴‍☠️ Straw Hat Fruit Generator 🍊</h2>
        <div id="nameDisplay">klik tombol di bawah</div>
        
        <button onclick="generateFruitNumberCode()">Acak Kode</button>
        <button class="copy-btn" onclick="copyCode()">Salin Kode</button>
        
        <div id="alert"></div>

        <div class="quote-container">
            <p class="quote-text">"Laut itu luas... Suatu hari nanti, pasti akan muncul teman yang akan melindungimu!"</p>
            <p class="quote-author">— Jaguar D. Saul</p>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playLightningSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function playChimeSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        function toggleTheme() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const body = document.body;
            const themeBtn = document.getElementById("themeBtn");
            body.classList.toggle("dark-mode");
            themeBtn.innerText = body.classList.contains("dark-mode") ? "☀️" : "🌙";
        }

        const fruits = [
            "apel", "jeruk", "mangga", "pisang", "melon", "durian", 
            "jambu", "nanas", "anggur", "pepaya", "salak", "manggis"
        ];

        function generateFruitNumberCode() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playLightningSound();

            const randomIndex = Math.floor(Math.random() * fruits.length);
            let result = fruits[randomIndex];
            
            if (result.length > 6) {
                result = result.substring(0, 5);
            }
            
            while (result.length < 8) {
                const randomDigit = Math.floor(Math.random() * 10);
                result += randomDigit;
            }
            
            const display = document.getElementById("nameDisplay");
            display.innerText = result;
            display.classList.remove("animate-text");
            void display.offsetWidth; 
            display.classList.add("animate-text");
            document.getElementById("alert").innerText = ""; 
        }

        // ========================================================
        // PERBAIKAN LOGIKA SALIN: MENGGUNAKAN METODE CADANGAN AMAN
        // ========================================================
        function copyCode() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const codeText = document.getElementById("nameDisplay").innerText;
            if (codeText === 'klik tombol di bawah') return;

            // Membuat kotak teks tersembunyi untuk menyiasati keamanan browser
            const dummyTextArea = document.createElement("textarea");
            document.body.appendChild(dummyTextArea);
            dummyTextArea.value = codeText;
            dummyTextArea.select();
            dummyTextArea.setSelectionRange(0, 99999); // Untuk perangkat HP

            try {
                // Mengeksekusi salin teks dengan cara tradisional
                const successful = document.execCommand('copy');
                if (successful) {
                    playChimeSound();
                    const alertDiv = document.getElementById("alert");
                    alertDiv.innerText = "✓ Kode berhasil disalin!";
                    setTimeout(() => { alertDiv.innerText = ""; }, 2000);
