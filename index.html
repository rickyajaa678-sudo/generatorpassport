<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Kode Buah - Edisi Kru Topi Jerami</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            /* Membaca langsung file gambar wallpaper yang Anda unggah ke GitHub sendiri */
            background: url('wallpaper.png') no-repeat center center fixed;
            background-size: cover;
        }

        /* Kartu utama dibuat semi-transparan dengan efek kaca buram */
        .card { 
            background: rgba(255, 255, 255, 0.88); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            text-align: center; 
            max-width: 400px; 
            width: 90%; 
            border: 4px solid #e67e22; 
        }

        h2 {
            color: #2c3e50; 
            margin-top: 0;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        button { 
            background-color: #e74c3c; 
            color: white; 
            border: none; 
            padding: 14px 28px; 
            font-size: 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            margin: 10px; 
            transition: all 0.2s ease; 
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        button:hover { 
            background-color: #c0392b; 
            transform: translateY(-2px); 
        }
        button:active {
            transform: scale(0.95); 
        }

        .copy-btn { background-color: #27ae60; }
        .copy-btn:hover { background-color: #219a52; }

        #nameDisplay { 
            font-size: 26px; 
            font-weight: bold; 
            margin: 20px 0; 
            min-height: 38px; 
            color: #d35400; 
            padding: 12px; 
            background: #fdf6e2; 
            border-radius: 8px; 
            border: 2px dashed #e67e22; 
            letter-spacing: 2px; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-text {
            animation: fadeIn 0.2s ease forwards;
        }

        #alert { color: #27ae60; font-size: 14px; height: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🏴‍☠️ Straw Hat Fruit Generator 🍊</h2>
        <div id="nameDisplay">klik tombol di bawah</div>
        
        <button onclick="generateFruitNumberCode()">Acak Kode</button>
        <button class="copy-btn" onclick="copyCode()">Salin Kode</button>
        
        <div id="alert"></div>
    </div>

    <script>
        const fruits = [
            "apel", "jeruk", "mangga", "pisang", "melon", "durian", 
            "jambu", "nanas", "anggur", "pepaya", "salak", "manggis"
        ];

        function generateFruitNumberCode() {
            const randomIndex = Math.floor(Math.random() * fruits.length);
            let result = fruits[randomIndex];
            
            if (result.length > 6) {
                result = result.substring(0, 5);
            }
            
            while (result.length < 8) {
                const randomDigit = Math.floor(Math.random() * 10);
                result += randomDigit;
            }
            
            const display = document.getElementById("nameDisplay");
            display.innerText = result;
            display.classList.remove("animate-text");
            void display.offsetWidth; 
            display.classList.add("animate-text");
            
            document.getElementById("alert").innerText = ""; 
        }

        function copyCode() {
            const codeText = document.getElementById("nameDisplay").innerText;
            if (codeText === 'klik tombol di bawah') return;
            
            navigator.clipboard.writeText(codeText).then(() => {
                const alertDiv = document.getElementById("alert");
                alertDiv.innerText = "✓ Kode berhasil disalin!";
                setTimeout(() => { alertDiv.innerText = ""; }, 2000);
            }).catch(err => {
                alert("Gagal menyalin teks");
            });
        }
    </script>
</body>
</html>
