<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genjutsu Sharingan Simulator</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif;
            transition: background 0.5s ease;
        }

        /* Dimensi Genjutsu (Awalnya Tersembunyi) */
        .genjutsu-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #7f0000, #000000 80%);
            opacity: 0; pointer-events: none; z-index: 1;
            transition: opacity 0.5s ease;
        }

        /* Efek Api Hitam Amaterasu */
        .amaterasu {
            position: fixed; width: 100%; height: 100%; z-index: 3;
            pointer-events: none; display: none;
            background-image: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.9) 70%);
            box-shadow: inset 0 0 100px #000, inset 0 0 200px #000;
        }

        /* KOTAK DESAIN MATA SHARINGAN 3D */
        .eye-socket {
            width: 320px; height: 320px; background: #fff;
            border-radius: 50%; border: 12px solid #111;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.4), inset 0 0 30px rgba(0,0,0,0.6);
            display: flex; justify-content: center; align-items: center;
            position: relative; z-index: 5; cursor: pointer;
            transition: all 0.1s ease;
        }

        /* Selaput Mata Merah (Iris) */
        .iris {
            width: 240px; height: 240px; background: #cc0000;
            border-radius: 50%; border: 6px solid #111;
            position: absolute; display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 0 20px rgba(204,0,0,0.6);
            transition: transform 0.05s linear; /* Membuat lirik mata sangat responsif */
        }

        /* Pola Melingkar di Dalam Mata */
        .tomoe-ring {
            position: absolute; width: 150px; height: 150px;
            border: 2px dashed rgba(0, 0, 0, 0.35); border-radius: 50%;
        }

        /* Pupil Hitam di Tengah */
        .pupil {
            width: 65px; height: 65px; background: #111; border-radius: 50%;
            position: relative; z-index: 6;
            box-shadow: 0 0 15px rgba(0,0,0,1);
        }

        /* MANGEKYOU SHARINGAN ITACHI (Bentuk Tiga Bilah Pisau Shuriken Melengkung) */
        .blade {
            position: absolute; width: 35px; height: 95px;
            background: #111; border-radius: 100% 0 100% 0;
            transform-origin: 50% 100%; top: 25px;
        }
        .b1 { transform: rotate(0deg) translateY(-5px); }
        .b2 { transform: rotate(120deg) translateY(-5px); }
        .b3 { transform: rotate(240deg) translateY(-5px); }

        /* TEKS INSTRUKSI DIMENSI */
        .instruction {
            position: absolute; bottom: 40px; color: #fff;
            font-size: 15px; font-weight: bold; letter-spacing: 2px;
            text-align: center; z-index: 10; pointer-events: none;
            text-shadow: 0 2px 5px #000;
            animation: textPulse 1.5s infinite alternate;
        }

        @keyframes textPulse {
            0% { opacity: 0.4; } 100% { opacity: 1; }
        }

        /* Animasi Getar Layar Gila saat Genjutsu Aktif */
        .shake {
            animation: screenShake 0.15s infinite;
        }
        @keyframes screenShake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            100% { transform: translate(-1px, -2px) rotate(1deg); }
        }

        /* Animasi Putaran Cepat Mangekyou */
        .spin-active {
            animation: sharinganSpin 0.6s cubic-bezier(0.6, -0.28, 0.735, 0.045) infinite;
        }
        @keyframes sharinganSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(3600deg); }
        }
    </style>
</head>
<body>

    <!-- Latar Belakang Ilusi Tsukuyomi -->
    <div class="genjutsu-bg" id="tsukuyomi"></div>
    <div class="amaterasu" id="blackFlames"></div>

    <!-- Struktur Mata Sharingan -->
    <div class="eye-socket" id="eyeSocket" onclick="activateGenjutsu()">
        <div class="iris" id="eyeIris">
            <div class="tomoe-ring"></div>
            <!-- Tiga Bilah Mangekyou Itachi -->
            <div class="blade b1"></div>
            <div class="blade b2"></div>
            <div class="blade b3"></div>
            <div class="pupil"></div>
        </div>
    </div>

    <div class="instruction" id="statusText">TATAP MATANYA DAN KLIK UNTUK MENGAKTIFKAN GENJUTSU</div>

    <script>
        const socket = document.getElementById('eyeSocket');
        const iris = document.getElementById('eyeIris');
        const tsukuyomi = document.getElementById('tsukuyomi');
        const amaterasu = document.getElementById('blackFlames');
        const statusText = document.getElementById('statusText');

        // --- 1. LOGIKA INTERAKTIF: MATA MELIRIK MENGIKUTI SENTUHAN / MOUSE ---
        function moveEye(clientX, clientY) {
            const rect = socket.getBoundingClientRect();
            // Titik tengah mata
            const eyeX = rect.left + rect.width / 2;
            const eyeY = rect.top + rect.height / 2;

            // Hitung sudut jarak antara kursor/jari ke tengah mata
            const angle = Math.atan2(clientY - eyeY, clientX - eyeX);
            const distance = Math.min(28, Math.hypot(clientX - eyeX, clientY - eyeY) / 10);

            // Geser iris mata secara halus
            const moveX = Math.cos(angle) * distance;
            const moveY = Math.sin(angle) * distance;

            // Jika sedang tidak dalam animasi berputar genjutsu, gerakkan matanya
            if (!iris.classList.contains('spin-active')) {
                iris.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        }

        // Deteksi gerakan Tikus Komputer
        window.addEventListener('mousemove', (e) => {
            moveEye(e.clientX, e.clientY);
        });

        // Deteksi usapan jari pada Layar HP
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                moveEye(e.touches[0].clientX, e.touches[0].clientY);
            }
        });


        // --- 2. LOGIKA AUDIO SYNTHESIZER: SUARA DENYUT GENJUTSU ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let soundInterval;

        function playGenjutsuSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(60, audioCtx.currentTime); // Frekuensi dengung rendah hipnotis
            osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.4);
            
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }


        // --- 3. LOGIKA UTAMA: AKTIVASI KIAMAT GENJUTSU TSUKUYOMI ---
        let isGenjutsuActive = false;

        function activateGenjutsu() {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (!isGenjutsuActive) {
                isGenjutsuActive = true;
                
                // Mulai mainkan suara detak ilusi setiap 0.5 detik
                playGenjutsuSound();
                soundInterval = setInterval(playGenjutsuSound, 500);

                // Jalankan efek animasi gila
                iris.classList.add('spin-active');
                document.body.classList.add('shake');
                tsukuyomi.style.opacity = '1';
                statusText.innerText = "KAU SUDAH MASUK DALAM DIMENSI TSUKUYOMI ITACHI!";
                statusText.style.color = "#ff0000";

                // Setelah 3 detik, munculkan api hitam Amaterasu yang membakar layar
                setTimeout(() => {
                    if (isGenjutsuActive) {
                        amaterasu.style.display = 'block';
                        statusText.innerText = "AMATERASU! LAYARMU MULAI TERBAKAR API HITAM!";
                    }
                }, 3000);

            } else {
                // Jika diklik lagi, batalkan efek ilusi (Kembali Normal)
                isGenjutsuActive = false;
                clearInterval(soundInterval);
                
                iris.classList.remove('spin-active');
                document.body.classList.remove('shake');
                tsukuyomi.style.opacity = '0';
                amaterasu.style.display = 'none';
                iris.style.transform = 'translate(0px, 0px)';
                statusText.innerText = "TATAP MATANYA DAN KLIK UNTUK MENGAKTIFKAN GENJUTSU";
                statusText.style.color = "#fff";
            }
        }
    </script>
</body>
</html>
