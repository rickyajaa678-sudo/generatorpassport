<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerbang Pemanggilan Naga Shenron 3D</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to bottom, #111e25, #080c10);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 1s ease;
            perspective: 1000px;
        }

        /* EFEK BADAI PETIR (DENGAN ANIMASI SKRAP KILAT) */
        .sky-storm {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; opacity: 0; pointer-events: none; z-index: 1;
        }
        @keyframes lightningFlash {
            0%, 90%, 94%, 98%, 100% { background: #000; }
            92%, 96% { background: #fff; }
        }
        .active-storm {
            opacity: 1;
            animation: lightningFlash 4s infinite;
        }

        /* ========================================================
           NAGA SHENRON 3D (DESAIN KODE CSS STRUKTUR)
           ======================================================== */
        .shenron-container {
            position: absolute; width: 300px; height: 300px;
            z-index: 5; display: none; transform-style: preserve-3d;
            animation: floatDragon 4s ease-in-out infinite alternate;
        }
        @keyframes floatDragon {
            0% { transform: translateY(20px) rotateX(10deg) rotateY(10deg); }
            100% { transform: translateY(-20px) rotateX(-5deg) rotateY(-10deg); }
        }

        /* Badan Naga Meliuk-Liuk */
        .dragon-body {
            position: absolute; width: 260px; height: 260px;
            border: 35px solid #2ecc71; border-radius: 50%;
            border-bottom-color: #f1c40f; /* Perut kuning naga */
            border-left-color: #27ae60;
            filter: drop-shadow(0 0 30px rgba(46,204,113,0.6));
        }

        /* Kepala Naga */
        .dragon-head {
            position: absolute; top: -20px; left: 100px;
            width: 70px; height: 50px; background: #27ae60;
            border-radius: 20px 40px 10px 10px;
            border-bottom: 10px solid #f1c40f;
        }
        /* Mata Merah Menyala Shenron */
        .dragon-head::before, .dragon-head::after {
            content: ""; position: absolute; top: 12px;
            width: 10px; height: 10px; background: #e74c3c;
            border-radius: 50%; box-shadow: 0 0 15px #e74c3c;
        }
        .dragon-head::before { left: 15px; }
        .dragon-head::after { left: 40px; }

        /* Antena Emas Panjang */
        .horns {
            position: absolute; top: -35px; left: 15px;
            width: 40px; height: 40px; border: 6px solid #f1c40f;
            border-bottom: none; border-left: none; transform: rotate(-30deg);
        }

        /* ========================================================
           7 DRAGON BALLS (BOLA NAGA)
           ======================================================== */
        .altar {
            display: flex; gap: 15px; z-index: 10; margin-top: 150px;
            transition: all 1s ease;
        }
        .dragon-ball {
            width: 50px; height: 50px; background: radial-gradient(circle at 30% 30%, #ff9f43, #ee5253);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            color: #fff; font-weight: bold; font-size: 18px;
            box-shadow: 0 4px 15px rgba(238,82,83,0.5), inset -5px -5px 10px rgba(0,0,0,0.3);
            text-shadow: 0 0 5px #fff; cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .dragon-ball:hover { transform: scale(1.2) translateY(-10px); box-shadow: 0 0 25px #ff9f43; }

        /* Animasi Bola Berkumpul saat Dipanggil */
        .balls-gather {
            transform: scale(0.2) translate(0, -400px) !important;
            opacity: 0.5;
            box-shadow: 0 0 50px #ff9f43 !important;
        }

        /* ========================================================
           KOTAK PERMINTAAN GAIB (WISH PANEL)
           ======================================================== */
        .wish-box {
            background: rgba(255, 255, 255, 0.92); padding: 25px;
            border-radius: 16px; border: 4px solid #f1c40f;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            text-align: center; max-width: 380px; width: 90%;
            position: absolute; z-index: 20; display: none;
            animation: popWish 0.5s ease forwards;
        }
        @keyframes popWish { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .wish-box h2 { color: #2c3e50; font-size: 20px; margin-top: 0; }
        .wish-box input {
            width: 100%; padding: 10px; border: 2px solid #ccc;
            border-radius: 8px; font-size: 14px; outline: none; margin-bottom: 12px;
            text-align: center;
        }
        .wish-box button {
            background: #2ecc71; color: white; border: none; padding: 10px 20px;
            font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }
        .wish-box button:hover { background: #27ae60; }

        #codeDisplay {
            font-size: 24px; font-weight: bold; color: #ee5253;
            margin: 15px 0 5px 0; letter-spacing: 2px; display: none;
            background: #fdf6e2; padding: 8px; border-radius: 6px; border: 1px dashed #ee5253;
        }

        /* Tombol Panggil Utama */
        .summon-btn {
            z-index: 10; background: #ee5253; color: white; border: 4px solid #f1c40f;
            padding: 15px 35px; font-size: 16px; font-weight: bold; border-radius: 50px;
            cursor: pointer; margin-top: 30px; box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            transition: all 0.2s;
        }
        .summon-btn:hover { background: #ff9f43; transform: scale(1.05); }

        #statusText {
            z-index: 10; color: #f1c40f; font-weight: bold; font-size: 15px;
            margin-top: 20px; letter-spacing: 1px; text-shadow: 0 2px 4px #000;
        }
    </style>
</head>
<body>

    <!-- Efek Badai Petir -->
    <div class="sky-storm" id="stormBg"></div>

    <!-- Naga Shenron 3D -->
    <div class="shenron-container" id="shenron">
        <div class="dragon-body"></div>
        <div class="dragon-head">
            <div class="horns"></div>
        </div>
    </div>

    <!-- Altar Tempat 7 Dragon Ball -->
    <div class="altar" id="ballAltar">
        <div class="dragon-ball">⭐</div>
        <div class="dragon-ball">⭐⭐</div>
        <div class="dragon-ball">⭐⭐⭐</div>
        <div class="dragon-ball">⭐⭐⭐⭐</div>
        <div class="dragon-ball">5⭐</div>
        <div class="dragon-ball">6⭐</div>
        <div class="dragon-ball">7⭐</div>
    </div>

    <div id="statusText">7 BOLA NAGA SUDAH TERKUMPUL DI ALTAR</div>

    <button class="summon-btn" id="summonBtn" onclick="summonShenron()">PANGGIL SHENRON!</button>

    <!-- Kotak Pengabul Permintaan -->
    <div class="wish-box" id="wishBox">
        <h2>🐉 SEBUTKAN PERMINTAANMU!</h2>
        <p style="font-size: 13px; color: #7f8c8d; margin-bottom: 15px;">Shenron akan mengabulkannya dalam bentuk kode gaib 8 digit.</p>
        <input type="text" id="wishInput" placeholder="Ketik permintaanmu di sini...">
        <button onclick="grantWish()">KABULKAN!</button>
        <div id="codeDisplay">-------</div>
    </div>

    <script>
        // --- LOGIKA AUDIO SYNTHESIZER: SUARA GEMURUH BADAI ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playThunderSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 1.5);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        }

        // --- 1. PROSES PEMANGGILAN NAGA SHENRON ---
        function summonShenron() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playThunderSound();

            document.getElementById('summonBtn').style.display = 'none';
            document.getElementById('statusText').innerText = "MEMANGGIL SHENRON... LANGIT MENJADI GELAP!";
            document.body.style.background = "#05070a";

            // Efek Badai Kilat Aktif
            document.getElementById('stormBg').classList.add('active-storm');

            // Bola naga menyatu berkumpul ke tengah langit
            const balls = document.querySelectorAll('.dragon-ball');
            balls.forEach(ball => {
                ball.classList.add('balls-gather');
            });

            // Setelah 2 detik, Naga Shenron 3D keluar
            setTimeout(() => {
                document.getElementById('ballAltar').style.display = 'none';
                document.getElementById('shenron').style.display = 'block';
                document.getElementById('statusText').innerText = "SHENRON: SEBUTKAN PERMINTAANMU, AKAN KUKABULKAN SATU!";
                
                // Munculkan kotak pengabul keinginan
                setTimeout(() => {
                    document.getElementById('wishBox').style.display = 'block';
                }, 1000);
            }, 2000);
        }
